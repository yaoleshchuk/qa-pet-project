name: Quality Gate - Manual

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Which tests to run?'
        required: true
        default: 'acceptance'
        type: choice
        options:
          - acceptance
          - smoke
          - regression

jobs:
  run-tests:
    name: Run ${{ github.event.inputs.tag }} Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install


      - name: Validate ${{ github.event.inputs.tag }} test suite (dry-run)
        run: npx cucumber-js --profile ${{ github.event.inputs.tag }} --dry-run

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.event.inputs.tag }}
          path: reports/
          if-no-files-found: ignore
