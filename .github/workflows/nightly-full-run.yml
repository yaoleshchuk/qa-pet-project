name: Quality Gate - Nightly Full Run

on:
  schedule:
    - cron: '0 0 * * *'  # Every day at 00:00 UTC = 01:00 CET
  workflow_dispatch: {}

jobs:
  acceptance:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install chromium --with-deps
      - name: Run @Acceptance (dry-run)
        run: npx cucumber-js --profile acceptance --dry-run
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-acceptance-report
          path: reports/
          if-no-files-found: ignore

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: acceptance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install chromium --with-deps
      - name: Run @Smoke (dry-run)
        run: npx cucumber-js --profile smoke --dry-run
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-smoke-report
          path: reports/
          if-no-files-found: ignore

  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install chromium --with-deps
      - name: Run @Regression (dry-run)
        run: npx cucumber-js --profile regression --dry-run
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-regression-report
          path: reports/
          if-no-files-found: ignore
